name: Deploy Changed Services

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get changed apps
        id: changes
        run: |
          BEFORE=${{ github.event.before }}
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE=$(git rev-list --max-parents=0 HEAD)
          fi

          CHANGED=$(git diff --name-only $BEFORE ${{ github.sha }} \
            | grep '/' \
            | cut -d/ -f1 \
            | sort -u \
            | tr '\n' ' ')

          echo "Changed dirs: $CHANGED"
          echo "CHANGED_DIRS=$CHANGED" >> $GITHUB_OUTPUT

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          CHANGED_DIRS: ${{ steps.changes.outputs.CHANGED_DIRS }}
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: CHANGED_DIRS
          script: |
            set -e
            cd /opt/docker
            git pull

            for dir in $CHANGED_DIRS; do
              if [ -f "$dir/docker-compose.yml" ]; then
                echo "🚀 Updating $dir"
                cd "$dir"
                docker compose pull
                docker compose up -d --remove-orphans
                cd /opt/docker
              else
                echo "Skipping $dir (no docker-compose.yml)"
              fi
            done
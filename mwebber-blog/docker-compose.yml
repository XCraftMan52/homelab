services:
  mwebber-blog:
    image: ghcr.io/vid131/mwebber-blog:latest
    container_name: mwebber-blog
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mwebber.rule=Host(`$MWEBBER_DOMAIN_NAME`)"
      - "traefik.http.routers.mwebber.entrypoints=https"
      - "traefik.http.routers.mwebber.tls.certresolver=dns-cloudflare"
      - "traefik.http.services.mwebber.loadBalancer.server.port=3000"

networks:
  proxy:
    external: true
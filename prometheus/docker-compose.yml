services:
  prometheus:
    image: prom/prometheus:v3.11.1
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --storage.tsdb.retention.time=7d
      - --storage.tsdb.retention.size=2GB
      - --web.enable-remote-write-receiver
    volumes:
      - ./data/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - ./data_prometheus:/prometheus
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`$PROMETHEUS_DOMAIN`)"
      - "traefik.http.routers.prometheus.entrypoints=https"
      - "traefik.http.routers.prometheus.tls.certresolver=dns-cloudflare"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
    restart: unless-stopped
    networks:
      - proxy

networks:
  proxy:
    external: true
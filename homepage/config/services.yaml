- Admin:
    - Pterodactyl Panel:
        icon: pterodactyl.png
        container: pterodactyl-panel
        server: docker
        href: "{{HOMEPAGE_VAR_PTERODACTYL_URL}}"
        widget:
            type: pterodactyl
            url: "{{HOMEPAGE_VAR_PTERODACTYL_URL}}"
            key: "{{HOMEPAGE_VAR_PTERODACTYL_API_KEY}}"
    - Vaultwarden:
        icon: vaultwarden.png
        href: "{{HOMEPAGE_VAR_VAULTWARDEN_URL}}"
        container: vaultwarden
        server: docker
        description: Password Management
- Containers:
    - Portainer:
        icon: portainer.svg
        href: "{{HOMEPAGE_VAR_PORTAINER_URL}}"
        container: portainer
        server: docker
        description: Docker Management
        widget:
            type: portainer
            url: "{{HOMEPAGE_VAR_PORTAINER_URL}}"
            env: 1
            key: "{{HOMEPAGE_VAR_PORTAINER_API_KEY}}"

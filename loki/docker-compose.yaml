---
services:
  loki:
    container_name: loki
    image: docker.io/grafana/loki:3.6.7
    command: "-config.file=/etc/loki/config.yaml"
    # ports:
    #   - "3100:3100"
    volumes:
      - ./data/config.yaml:/etc/loki/config.yaml:ro
      - ./data_loki:/loki:rw
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.loki.rule=Host(`$LOKI_DOMAIN`)"
      - "traefik.http.routers.loki.entrypoints=https"
      - "traefik.http.routers.loki.tls.certresolver=dns-cloudflare"
      - "traefik.http.services.loki.loadbalancer.server.port=3100"
    networks:
      - proxy
      - grafana
    restart: unless-stopped


networks:
  proxy:
    external: true
  grafana:
    external: true

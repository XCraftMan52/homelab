services:
  webtrees:
    container_name: webtrees
    image: nathanvaughn/webtrees:latest
    networks:
      - proxy
      - webtrees
    volumes:
      - ./data/data:/var/www/webtrees/data/
      - ./data/media:/var/www/webtrees/media/
      - ./data/modules_v4:/var/www/webtrees/modules_v4/
    environment:
      - DB_TYPE
      - DB_HOST
      - DB_USER
      - DB_NAME
      - DB_PASS
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.webtrees.rule=Host(`$WEBTREES_DOMAIN`)"
      - "traefik.http.routers.webtrees.entrypoints=https"
      - "traefik.http.routers.webtrees.tls=true"                        # ADD THIS
      - "traefik.http.routers.webtrees.tls.certresolver=dns-cloudflare"
      - "traefik.http.services.webtrees.loadbalancer.server.port=80"

  mysql:
    image: mysql:8.3
    container_name: webtrees-mysql
    restart: always
    networks:
      - webtrees
    env_file: 
      - .env
    volumes:
       - ./data_mysql:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD
      - MYSQL_USER
      - MYSQL_DATABASE
      - MYSQL_PASSWORD
    # command: --default-authentication-plugin=mysql_native_password

networks:
  webtrees:
    internal: true
  proxy:
    external: true